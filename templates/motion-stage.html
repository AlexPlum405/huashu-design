<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Motion Stage Junior Pass</title>
  <!--
  Junior Designer pass - not final.

  Assumptions:
  - This is a motion grammar test, not the final animation.
  - Final animation must define duration, keyframes, audio plan, and export needs.
  - Replace this hand-rolled stage with assets/animations.jsx for production motion.

  Open questions:
  - Duration and final platform?
  - BGM/SFX density?
  - Required brand/product assets or honest placeholder?
  -->
  <style>
    :root {
      --bg: #0f0f0d;
      --ink: #f5efe4;
      --muted: #8f877a;
      --accent: #dba95e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      width: min(100vw, 1280px);
      aspect-ratio: 16 / 9;
      background: var(--bg);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(245, 239, 228, 0.14);
    }

    .mark {
      position: absolute;
      left: 72px;
      top: 60px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .headline {
      position: absolute;
      left: 72px;
      bottom: 82px;
      max-width: 760px;
      font: 500 clamp(52px, 7vw, 104px)/0.92 ui-serif, Georgia, serif;
      text-wrap: balance;
      opacity: 0;
      transform: translateY(28px);
      animation: enter 1400ms cubic-bezier(.16, 1, .3, 1) 400ms forwards;
    }

    .orb {
      position: absolute;
      width: 280px;
      height: 280px;
      right: 92px;
      top: 120px;
      border: 1px solid rgba(219, 169, 94, 0.55);
      border-radius: 50%;
      animation: drift 5200ms cubic-bezier(.16, 1, .3, 1) infinite alternate;
    }

    .orb::before,
    .orb::after {
      content: "";
      position: absolute;
      inset: 38px;
      border: 1px solid rgba(245, 239, 228, 0.18);
      border-radius: 50%;
    }

    .orb::after {
      inset: 90px;
      background: var(--accent);
      border: 0;
      opacity: 0.9;
    }

    .timeline {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 36px;
      height: 1px;
      background: rgba(245, 239, 228, 0.14);
    }

    .timeline::after {
      content: "";
      display: block;
      height: 100%;
      width: 34%;
      background: var(--accent);
      animation: progress 3600ms linear infinite;
    }

    @keyframes enter {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      to { transform: translate(-34px, 24px) scale(1.08); }
    }

    @keyframes progress {
      from { transform: translateX(-100%); }
      to { transform: translateX(300%); }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Motion grammar stage">
    <div class="mark">Motion grammar / Junior pass</div>
    <div class="orb" aria-hidden="true"></div>
    <div class="headline">[One motion idea, not final copy]</div>
    <div class="timeline" aria-hidden="true"></div>
  </main>
</body>
</html>
